        <button className="iconbtn" title="Toggle theme" onClick={onToggleTheme} style={{ color: "var(--ink-2)" }}>
          {theme === "dark"
            ? <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"><circle cx="8" cy="8" r="3"/><line x1="8" y1="1" x2="8" y2="3"/><line x1="8" y1="13" x2="8" y2="15"/><line x1="1" y1="8" x2="3" y2="8"/><line x1="13" y1="8" x2="15" y2="8"/><line x1="3" y1="3" x2="4.4" y2="4.4"/><line x1="11.6" y1="11.6" x2="13" y2="13"/><line x1="13" y1="3" x2="11.6" y2="4.4"/><line x1="4.4" y1="11.6" x2="3" y2="13"/></svg>
            : <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round"><path d="M13 9.5A6 6 0 0 1 6.5 3a6 6 0 1 0 6.5 6.5z"/></svg>
          }
        </button>
      </div>

      {/* hero */}
      <div className="home-hero">
        <LanternMark size={68} style={{ color: "oklch(0.55 0.10 var(--pc-h))", marginBottom: 22 }} />
        <h1 className="home-wordmark">FABLE</h1>
        <p className="home-tagline">The AI-facilitated tabletop</p>
      </div>

      {/* recent sessions */}
      {window.SAVED_SESSIONS.length > 0 && (
        <div className="home-cards" style={{ marginBottom: 0 }}>
          <p className="home-section-label">Continue</p>
          {window.SAVED_SESSIONS.map((s) => (
            <div key={s.id} className="home-session-card" onClick={() => onResume(s)}
              role="button" tabIndex={0} onKeyDown={(e) => { if (e.key === "Enter" || e.key === " ") onResume(s); }}>
              <div className="home-session-icon">
                <LanternMark size={26} />
              </div>
              <div className="home-session-meta">
                <p className="home-session-title">{s.title}</p>
                <p className="home-session-sub">{s.chapter}</p>
                <div className="home-session-chips">
                  {s.tags.map((tag) => <span key={tag} className="home-chip">{tag}</span>)}
                  <span className="home-chip">{s.party.length} characters</span>
                  <span className="home-chip">{s.totalBeats} beats</span>
                </div>
              </div>
              <span className="home-session-ts">{fmtDate(s.lastPlayed)}</span>
            </div>
          ))}
        </div>
      )}

      <button className="home-new-btn" onClick={onNew}>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
        New session
      </button>

      <hr className="home-divider" />
      <p className="home-footer">FABLE Table Engine · phase-21 mockup</p>
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  /* theme */
  const [theme, setTheme] = React.useState(() => localStorage.getItem("fable.theme") || "light");
  React.useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("fable.theme", theme);
  }, [theme]);

  /* tweaks → CSS vars */
  React.useEffect(() => {
    const r = document.documentElement.style;
    const sc = ACCENT_SCHEMES[t.accentScheme] || ACCENT_SCHEMES.classic;
    r.setProperty("--gm-h", sc.gm); r.setProperty("--player-h", sc.player); r.setProperty("--pc-h", sc.pc);
    r.setProperty("--serif", SERIF_STACKS[t.serif] || SERIF_STACKS["Source Serif 4"]);
    const d = DENSITY[t.density] || DENSITY.regular;
    r.setProperty("--card-pad", d.pad + "px"); r.setProperty("--card-gap", d.gap + "px"); r.setProperty("--section-gap", d.section + "px");
  }, [t.accentScheme, t.serif, t.density]);

  /* ---- screen ---- */
  const [view, setView] = React.useState("home");
  const goPlay = () => setView("play");

  /* ---- scene state ---- */
  const idRef = React.useRef(window.OPENING.length);
  const [turns, setTurns] = React.useState(openingTurns);
  const [clocks, setClocks] = React.useState(() => clone(window.CLOCKS));
  const [characters, setCharacters] = React.useState(() => clone(window.CHARACTERS));
  const [recent, setRecent] = React.useState(() => [...window.RECENT]);
  const [pulses, setPulses] = React.useState({});
  const [spotlight, setSpotlight] = React.useState("Mira");

  const [beatIndex, setBeatIndex] = React.useState(0);
  const [busy, setBusy] = React.useState(false);
  const [ended, setEnded] = React.useState(false);
  const [pendingAction, setPendingAction] = React.useState(null);

  const [compose, setCompose] = React.useState(() => ({ ...window.BEATS[0].compose }));
  const [input, setInput] = React.useState(window.BEATS[0].suggest);

  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const [rulesOpen, setRulesOpen] = React.useState(false);
  const [expandArt, setExpandArt] = React.useState(null);
  const [saveState, setSaveState] = React.useState("saved");

  /* ---- sidebar ---- */
  const [activeTab, setActiveTab] = React.useState(window.SETTINGS_JSON.display.default_tab || "scene");
  const [selectedChar, setSelectedChar] = React.useState("mira");
  const [notesSub, setNotesSub] = React.useState("notes");

  /* ---- private notes (persisted) ---- */
  const [notes, setNotes] = React.useState(() => {
    try { const s = localStorage.getItem("fable.notes"); if (s) return JSON.parse(s); } catch (e) {}
    return [{ id: "seed1", text: "Patrol pauses at the west stair — about a 40-heartbeat circuit. Veil confirmed.", tags: ["clue"], pinned: true, ts: Date.now() - 360000 }];
  });
  React.useEffect(() => { try { localStorage.setItem("fable.notes", JSON.stringify(notes)); } catch (e) {} }, [notes]);
  const addNote = (n) => setNotes((arr) => [{ id: "n" + Date.now(), ts: Date.now(), pinned: false, tags: [], ...n }, ...arr]);
  const updateNote = (id, patch) => setNotes((arr) => arr.map((n) => n.id === id ? { ...n, ...patch } : n));
  const deleteNote = (id) => setNotes((arr) => arr.filter((n) => n.id !== id));

  /* ---- sidebar resize ---- */
  const [sidebarW, setSidebarW] = React.useState(() => {
    const s = parseInt(localStorage.getItem("fable.sidebarW") || "", 10);
    return Number.isFinite(s) ? Math.min(560, Math.max(300, s)) : 360;
  });
  const [dragging, setDragging] = React.useState(false);
  React.useEffect(() => { localStorage.setItem("fable.sidebarW", String(Math.round(sidebarW))); }, [sidebarW]);
  const startResize = (e) => {
    e.preventDefault();
    setDragging(true); document.body.classList.add("resizing");
    const move = (ev) => {
      const x = ev.clientX != null ? ev.clientX : (ev.touches && ev.touches[0] ? ev.touches[0].clientX : 0);
      setSidebarW(Math.min(560, Math.max(300, window.innerWidth - x)));
    };
    const up = () => {
      setDragging(false); document.body.classList.remove("resizing");
      window.removeEventListener("pointermove", move); window.removeEventListener("pointerup", up);
    };
    window.addEventListener("pointermove", move); window.addEventListener("pointerup", up);
  };

  /* ---- timers ---- */
  const timersRef = React.useRef([]);
  const clearTimers = () => { timersRef.current.forEach(clearTimeout); timersRef.current = []; };
  React.useEffect(() => clearTimers, []);

  /* ---- scroll follow ---- */
  const scrollRef = React.useRef(null);
  const followRef = React.useRef(true);
  const lastTopRef = React.useRef(0);
  const [showJump, setShowJump] = React.useState(false);
  const scrollToBottom = (smooth = false) => {
    const el = scrollRef.current; if (!el) return;
    if (smooth) el.scrollTo({ top: el.scrollHeight, behavior: "smooth" });
    else el.scrollTop = el.scrollHeight;
  };
  React.useLayoutEffect(() => { if (followRef.current) scrollToBottom(false); }, [turns, pendingAction]);
  const onScroll = () => {
    const el = scrollRef.current; if (!el) return;
    const top = el.scrollTop;
    const dist = el.scrollHeight - top - el.clientHeight;
    if (top < lastTopRef.current - 6) { followRef.current = false; setShowJump(true); }
    if (dist < 80) { followRef.current = true; setShowJump(false); }
    lastTopRef.current = top;
  };

  /* ---- engine ---- */
  const pushTurn = (turn) => setTurns((arr) => [...arr, { ...turn, _id: idRef.current++ }]);
  const bumpPulse = (key) => setPulses((p) => ({ ...p, [key]: (p[key] || 0) + 1 }));
  const addRecent = (text) => setRecent((r) => [text, ...r].slice(0, 14));

  const applyEvent = (ev) => {
    switch (ev.kind) {
      case "gm":   pushTurn({ kind: "gm", text: ev.text, gmq: ev.gmq }); break;
      case "ally": pushTurn({ kind: "ally", who: ev.who, text: ev.text }); break;
      case "npc":  pushTurn({ kind: "npc", who: ev.who, text: ev.text }); break;
      case "system": pushTurn({ kind: "system", text: ev.text }); addRecent(ev.text); break;
      case "dice": pushTurn({ kind: "dice", ...ev }); break;
      case "beat": pushTurn({ kind: "beat", text: ev.text }); break;
      case "tick": setClocks((cs) => cs.map((c) => c.id === ev.clock ? { ...c, filled: ev.to } : c)); bumpPulse("clock:" + ev.clock); break;
      case "stat":
        setCharacters((cs) => {
          const c = { ...cs[ev.who] };
          if (ev.scar) { const sc = [...c.scars]; const i = sc.findIndex((x) => !x); if (i >= 0) sc[i] = ev.scar; c.scars = sc; c.scarsList = [...(c.scarsList || []), { kind: ev.scar.type, text: ev.scar.label }]; }
          else c[ev.track] = { ...c[ev.track], val: ev.to };
          return { ...cs, [ev.who]: c };
        });
        bumpPulse("stat:" + ev.who + ":" + (ev.scar ? "scars" : ev.track));
        break;
      case "spotlight": setSpotlight(ev.who); break;
      case "recent": addRecent(ev.text); break;
      default: break;
    }
  };

  const runEvents = (events, i, onDone) => {
    if (i >= events.length) { onDone && onDone(); return; }
    const ev = events[i];
    const tm = setTimeout(() => { applyEvent(ev); runEvents(events, i + 1, onDone); }, ev.delay || 400);
    timersRef.current.push(tm);
  };

  const advance = (nextIdx) => {
    const next = window.BEATS[nextIdx];
    setBeatIndex(nextIdx);
    if (!next) { setEnded(true); setBusy(false); setSaveState("saved"); return; }
    setCompose({ ...next.compose });
    setInput(next.suggest);
    if (next.preEvents && next.preEvents.length) {
      setBusy(true); followRef.current = true;
      runEvents(next.preEvents, 0, () => { setBusy(false); setSaveState("saved"); });
    } else { setBusy(false); setSaveState("saved"); }
  };

  const onSend = () => {
    if (busy || ended || pendingAction) return;
    const beat = window.BEATS[beatIndex]; if (!beat) return;
    const text = (input.trim() || beat.suggest);
    followRef.current = true;
    pushTurn({ kind: "player", text, meta: { ...compose } });
    setInput("");
    setSaveState("saving");
    if (beat.action) { setPendingAction(beat.action); }   // open the resolution card
    else { setBusy(true); runEvents(beat.events, 0, () => advance(beatIndex + 1)); }
  };

  const onResolve = () => {
    const beat = window.BEATS[beatIndex]; if (!beat || !beat.action) return;
    setBusy(true); setSaveState("saving");
    const dice = { kind: "dice", delay: 350, skill: beat.action.skill, rating: beat.action.rating || 0, pool: beat.rolled.length, rolled: beat.rolled, result: beat.result, tn: beat.action.tn, big: beat.action.seam };
    followRef.current = true;
    runEvents([dice, ...beat.events], 0, () => { setPendingAction(null); advance(beatIndex + 1); });
  };

  const onWithdraw = () => {
    const beat = window.BEATS[beatIndex];
    setPendingAction(null); setSaveState("saved");
    if (beat) { setCompose({ ...beat.compose }); setInput(beat.suggest); }
  };

  const onQuickNote = () => {
    setActiveTab("notes"); setNotesSub("notes");
    const txt = input.trim();
    if (txt) addNote({ text: txt, tags: [] });
  };

  const endSession = () => {
    clearTimers();
    idRef.current = window.OPENING.length;
    setTurns(openingTurns());
    setClocks(clone(window.CLOCKS));
    setCharacters(clone(window.CHARACTERS));
    setRecent([...window.RECENT]);
    setPulses({}); setSpotlight("Mira");
    setBeatIndex(0); setBusy(false); setEnded(false); setPendingAction(null);
    setCompose({ ...window.BEATS[0].compose }); setInput(window.BEATS[0].suggest);
    setSaveState("saved"); followRef.current = true; setShowJump(false);
    requestAnimationFrame(() => scrollToBottom(false));
  };

  const goHome = () => { endSession(); setView("home"); };

  if (view === "home") {
    return (
      <div style={{ height: "100%", overflowY: "auto", background: "var(--paper)" }}>
        <HomeScreen
          onResume={goPlay}
          onNew={goPlay}
          theme={theme}
          onToggleTheme={() => setTheme((x) => (x === "dark" ? "light" : "dark"))}
        />
      </div>
    );
  }

  return (
    <div style={{ height: "100%", display: "flex", flexDirection: "column", background: "var(--paper)" }}>
      <TopBar session={window.SESSION} saveState={saveState} theme={theme}
        onToggleTheme={() => setTheme((x) => (x === "dark" ? "light" : "dark"))}
        onOpenSettings={() => setSettingsOpen(true)}
        onOpenRules={() => setRulesOpen(true)}
        onEndSession={goHome} />

      <div style={{ flex: 1, display: "flex", minHeight: 0 }}>
        {/* chat column */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
          <div style={{ flex: 1, position: "relative", minHeight: 0, display: "flex" }}>
            <Transcript turns={turns} bubbleStyle={t.bubble} scrollRef={scrollRef} onScroll={onScroll} onChipClick={(text) => setInput(text)} />
            {showJump && (
              <button className="jumppill" onClick={() => { followRef.current = true; setShowJump(false); scrollToBottom(true); }}>↓ Jump to latest</button>
            )}
          </div>
          <Composer compose={compose} setCompose={setCompose} value={input} onChange={setInput}
            onSend={onSend} busy={busy} ended={ended}
            pendingAction={pendingAction} onResolve={onResolve} onWithdraw={onWithdraw} onQuickNote={onQuickNote}
            clarifyMode={turns.length > 0 && turns[turns.length - 1].kind === "gm" && !!(turns[turns.length - 1].clarify)} />
        </div>

        {/* resize divider */}
        <div className={"divider" + (dragging ? " dragging" : "")} onPointerDown={startResize} role="separator" aria-label="Resize sidebar" />

        {/* sidebar */}
        <Sidebar width={sidebarW} scene={window.SCENE} characters={characters} clocks={clocks}
          openings={window.OPENINGS} maintained={window.MAINTAINED} recent={recent}
          spotlight={spotlight} pulses={pulses}
          activeTab={activeTab} onTab={setActiveTab}
          selectedChar={selectedChar} onSelectChar={setSelectedChar}
          notesSub={notesSub} onNotesSub={setNotesSub}
          notes={notes} onAddNote={addNote} onUpdateNote={updateNote} onDeleteNote={deleteNote}
          art={window.SCENE_ART} map={window.MAP}
          onExpandArt={() => setExpandArt("scene")} onExpandMap={() => setExpandArt("map")} />
      </div>

      <SettingsEditor open={settingsOpen} onClose={() => setSettingsOpen(false)} />
      <RulesViewer open={rulesOpen} onClose={() => setRulesOpen(false)} />

      <ArtOverlay kind={expandArt} art={window.SCENE_ART} map={window.MAP} onClose={() => setExpandArt(null)} />

      <TweaksPanel>
        <TweakSection label="Accents" />
        <TweakSelect label="Accent scheme" value={t.accentScheme}
          options={Object.keys(ACCENT_SCHEMES).map((k) => ({ value: k, label: ACCENT_SCHEMES[k].label }))}
          onChange={(v) => setTweak("accentScheme", v)} />
        <TweakSection label="Typography" />
        <TweakSelect label="Body serif" value={t.serif} options={Object.keys(SERIF_STACKS)} onChange={(v) => setTweak("serif", v)} />
        <TweakSection label="Transcript" />
        <TweakRadio label="Bubble style" value={t.bubble}
          options={[{ value: "edge", label: "Edge rule" }, { value: "filled", label: "Filled tint" }]}
          onChange={(v) => setTweak("bubble", v)} />
        <TweakSection label="Sidebar" />
        <TweakRadio label="Density" value={t.density} options={["compact", "regular", "comfy"]} onChange={(v) => setTweak("density", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>

</body>
</html>
